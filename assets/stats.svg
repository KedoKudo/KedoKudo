<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="244" viewBox="0 0 720 244" fill="none" role="img"
     aria-label="GitHub stats for KedoKudo" xmlns="http://www.w3.org/2000/svg">
  <style>
    svg { font-family: -apple-system, 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; }
    .card   { fill: #ffffff; stroke: #d0d7de; }
    .title  { font-size: 17px; font-weight: 700; fill: #1f2328; }
    .date   { font-size: 12px; fill: #656d76; }
    .number { font-size: 27px; font-weight: 800; fill: #1f2328; }
    .label  { font-size: 12px; fill: #656d76; }
    .section { font-size: 12px; font-weight: 600; fill: #656d76; letter-spacing: .5px; }
    .legend { font-size: 12.5px; font-weight: 600; fill: #1f2328; }
    .other  { fill: #d0d7de; }
    @media (prefers-color-scheme: dark) {
      .card   { fill: #0d1117; stroke: #30363d; }
      .title, .number, .legend { fill: #f0f6fc; }
      .date, .label, .section { fill: #8b949e; }
      .other  { fill: #30363d; }
    }
    .fade { opacity: 0; animation: fadeIn .6s ease forwards; }
    .bar-anim { transform: scaleX(0); transform-origin: 28px 0; animation: grow .9s .35s cubic-bezier(.2,.7,.3,1) forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes grow { to { transform: scaleX(1); } }
  </style>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#2ea043" />
    </linearGradient>
    <clipPath id="card-clip"><rect x="0.5" y="0.5" width="719" height="243" rx="14" /></clipPath>
    <clipPath id="bar-clip"><rect x="28" y="166" width="664" height="12" rx="6" /></clipPath>
  </defs>
  <rect class="card" x="0.5" y="0.5" width="719" height="243" rx="14" stroke-width="1" />
  <rect x="0" y="0" width="720" height="4" fill="url(#accent)" clip-path="url(#card-clip)" />
  <g class="fade">
    <text x="28" y="48" class="title">KedoKudo · GitHub Snapshot</text>
    <text x="692" y="48" text-anchor="end" class="date">Jul 17, 2026</text>
  </g>
  <g class="fade" style="animation-delay: 0.1s"><text x="28" y="100" class="number">37</text><text x="28" y="121" class="label">Followers</text></g>
<g class="fade" style="animation-delay: 0.2s"><text x="194" y="100" class="number">92</text><text x="194" y="121" class="label">Following</text></g>
<g class="fade" style="animation-delay: 0.3s"><text x="360" y="100" class="number">221</text><text x="360" y="121" class="label">Repos tracked</text></g>
<g class="fade" style="animation-delay: 0.4s"><text x="526" y="100" class="number">67</text><text x="526" y="121" class="label">Stars earned</text></g>
  <text x="28" y="152" class="section fade" style="animation-delay: .3s">TOP LANGUAGES</text>
  <g class="bar-anim" clip-path="url(#bar-clip)"><rect x="28.0" y="166" width="209.8" height="12" fill="#f34b7d" /><rect x="239.8" y="166" width="201.8" height="12" fill="#3572A5" /><rect x="443.7" y="166" width="164.0" height="12" fill="#e34c26" /><rect x="609.7" y="166" width="30.5" height="12" fill="#0000cc" /><rect x="642.2" y="166" width="13.9" height="12" fill="#dea584" /><rect x="658.1" y="166" width="9.3" height="12" fill="#3178c6" /><rect x="669.4" y="166" width="22.6" height="12" class="other" /></g>
  <g class="fade" style="animation-delay: 0.50s"><circle cx="33" cy="200" r="5" fill="#f34b7d" /><text x="44" y="204" class="legend">C++ <tspan class="label">31.9%</tspan></text></g><g class="fade" style="animation-delay: 0.58s"><circle cx="254" cy="200" r="5" fill="#3572A5" /><text x="265" y="204" class="legend">Python <tspan class="label">30.7%</tspan></text></g><g class="fade" style="animation-delay: 0.66s"><circle cx="476" cy="200" r="5" fill="#e34c26" /><text x="487" y="204" class="legend">HTML <tspan class="label">25%</tspan></text></g><g class="fade" style="animation-delay: 0.74s"><circle cx="33" cy="222" r="5" fill="#0000cc" /><text x="44" y="226" class="legend">IGOR Pro <tspan class="label">4.9%</tspan></text></g><g class="fade" style="animation-delay: 0.82s"><circle cx="254" cy="222" r="5" fill="#dea584" /><text x="265" y="226" class="legend">Rust <tspan class="label">2.4%</tspan></text></g><g class="fade" style="animation-delay: 0.90s"><circle cx="476" cy="222" r="5" fill="#3178c6" /><text x="487" y="226" class="legend">TypeScript <tspan class="label">1.7%</tspan></text></g>
</svg>