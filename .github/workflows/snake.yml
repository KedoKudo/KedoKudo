name: Generate contribution snake

on:
  schedule:
    - cron: '51 3 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake animations
        # miccy/snake-evolution scrapes GitHub's public contribution HTML instead
        # of using the GraphQL contributionsCollection query, which was rejected
        # with RESOURCE_LIMITS_EXCEEDED for this account even with an explicit
        # one-year date range. HTML scraping bypasses that limit entirely.
        uses: miccy/snake-evolution@42e6db66e50979a0fffbb857ed833c731f77abae
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
