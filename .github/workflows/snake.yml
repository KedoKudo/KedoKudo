name: Generate contribution snake

on:
  schedule:
    - cron: '51 3 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake animations
        # Pinned to the KedoKudo/snk fork: upstream Platane/snk@v3 issues a
        # rangeless contributionsCollection query that GitHub's GraphQL API now
        # rejects with RESOURCE_LIMITS_EXCEEDED for this account. The fork requests
        # an explicit "today minus one year to today" range. See KedoKudo/snk@ranged-fetch.
        uses: KedoKudo/snk/svg-only@630f9244e601cf6e543bdca79ddcfdea21e6508f
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
